networks:
  omni:
    driver: bridge

volumes:
  php_brew_cache:
  php_composer_cache:
  php_npm_cache:
  node_brew_cache:
  node_npm_cache:
  node_pnpm_cache:

services:
  caddy:
    build:
      context: ./caddy
      args:
        USERNAME: ${USERNAME}
        USER_UID: ${USER_UID}
        USER_GID: ${USER_GID}
        TZ: ${TIMEZONE}
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT}:80"
      - "${CADDY_HTTPS_PORT}:443"
      - "${CADDY_HTTPS_PORT}:443/udp"
    volumes:
      - ${PROJECTS_PATH}:/var/www
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/conf.d:/etc/caddy/conf.d
      - ./logs/caddy:/var/log/caddy
      - ${DATA_PATH}/caddy_data:/data
      - ${DATA_PATH}/caddy_config:/config
    networks:
      - omni
    depends_on:
      - php
      - node

  php:
    build:
      context: ./php
      args:
        USERNAME: ${USERNAME}
        USER_UID: ${USER_UID}
        USER_GID: ${USER_GID}
        TZ: ${TIMEZONE}
    container_name: php
    restart: unless-stopped
    volumes:
      - ${HOME_PATH}/.ssh:/home/${USERNAME}/.ssh
      - ${HOME_PATH}/.local/share/opencode:/home/${USERNAME}/.local/share/opencode
      - ${HOME_PATH}/.local/state/opencode:/home/${USERNAME}/.local/state/opencode
      - ${HOME_PATH}/.config/opencode:/home/${USERNAME}/.config/opencode
      - ${PROJECTS_PATH}:/var/www
      - php_brew_cache:/home/${USERNAME}/.cache/Homebrew
      - php_composer_cache:/home/${USERNAME}/.composer
      - php_npm_cache:/home/${USERNAME}/.npm
      - ./php/conf:/opt/php-conf:ro
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    networks:
      - omni
    depends_on:
      - mysql
      - redis
      - mongo

  node:
    build:
      context: ./node
      args:
        USERNAME: ${USERNAME}
        USER_UID: ${USER_UID}
        USER_GID: ${USER_GID}
        TZ: ${TIMEZONE}
    container_name: node
    restart: unless-stopped
    volumes:
      - ${HOME_PATH}/.ssh:/home/${USERNAME}/.ssh
      - ${HOME_PATH}/.local/share/opencode:/home/${USERNAME}/.local/share/opencode
      - ${HOME_PATH}/.local/state/opencode:/home/${USERNAME}/.local/state/opencode
      - ${HOME_PATH}/.config/opencode:/home/${USERNAME}/.config/opencode
      - ${PROJECTS_PATH}:/var/www
      - node_brew_cache:/home/${USERNAME}/.cache/Homebrew
      - node_npm_cache:/home/${USERNAME}/.npm
      - node_pnpm_cache:/home/${USERNAME}/.local/share/pnpm/store
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    networks:
      - omni
    depends_on:
      - mysql
      - redis
      - mongo

  mysql:
    image: mysql:${MYSQL_VERSION}
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ${DATA_PATH}/mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/databases:/databases:ro
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - omni

  mongo:
    image: mongo:${MONGO_VERSION}
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - ${DATA_PATH}/mongo:/data/db
    ports:
      - "${MONGO_PORT}:27017"
    networks:
      - omni

  redis:
    image: redis:${REDIS_VERSION}
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${DATA_PATH}/redis:/data
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - omni

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
        - "${MAILPIT_HTTP_PORT}:8025"
        - "${MAILPIT_SMTP_PORT}:1025"
    networks:
      - omni

  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    environment:
      - PUID=${USER_UID}
      - PGID=${USER_GID}
      - ENCRYPTION_KEY=${ARCANE_ENCRYPTION_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_PATH}/arcane:/app/data
    networks:
      - omni
